<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />

    <!-- Primary Meta Tags -->
    <title>New API</title>
    <meta name="title" content="New API" />
    <meta
      name="description"
      content="Unified AI API gateway and admin dashboard."
    />

    <meta name="theme-color" content="#fff" />
    <!--umami-->
    <!--Google Analytics-->
  </head>

  <body>
    <script>
      ;(() => {
        const match = document.cookie.match(/(?:^|; )theme_preset=([^;]*)/)
        const savedPreset = match ? decodeURIComponent(match[1]) : 'xingluo'
        const presets = [
          'default',
          'xingluo',
          'underground',
          'rose-garden',
          'lake-view',
          'sunset-glow',
          'forest-whisper',
          'ocean-breeze',
          'lavender-dream',
          'simple-large',
          'anthropic',
        ]
        document.body.dataset.themePreset = presets.includes(savedPreset)
          ? savedPreset
          : 'xingluo'
      })()
    </script>
    <div id="root" translate="no" class="notranslate"></div>
  </body>
</html>
